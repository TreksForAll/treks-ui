<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/Favicon.webp" />
    <link rel="icon" type="image/webp" sizes="32x32" href="/Favicon.webp" />
    <link rel="icon" type="image/webp" sizes="16x16" href="/Favicon.webp" />
    <link rel="apple-touch-icon" href="/Favicon.webp" />
    <link rel="apple-touch-icon" sizes="180x180" href="/Favicon.webp" />
    <meta name="msapplication-TileImage" content="/Favicon.webp" />
    <meta name="msapplication-TileColor" content="#0ea5e9" />
    <meta name="theme-color" content="#39818c" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no" />
    
    <!-- Performance optimization meta tags -->
    <meta name="format-detection" content="telephone=no">
    <meta name="x-dns-prefetch-control" content="on">
    
    <title>Treks for All - Inclusive Adventure Travel for Everyone</title>
    <meta name="description" content="WHERE OUTDOOR BELONGS TO EVERYONE AND ADVENTURE KNOWS NO BARRIER. Accessible trekking, river expeditions, and adventure stays designed for people of all abilities. Founded in partnership with v-shesh, Aquaterra Adventures, and Metores Trust." />
    <meta name="keywords" content="accessible trekking, inclusive adventure, wheelchair accessible travel, adaptive adventure, disability travel, Himalayan treks, accessible camping, inclusive tourism, barrier-free travel, adventure for all" />
    <meta name="author" content="Treks for All" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://treksforall.in/" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Treks for All - Inclusive Adventure Travel for Everyone" />
    <meta property="og:description" content="WHERE OUTDOOR BELONGS TO EVERYONE AND ADVENTURE KNOWS NO BARRIER. Accessible trekking, river expeditions, and adventure stays designed for people of all abilities." />
    <meta property="og:url" content="https://treksforall.in/" />
    <meta property="og:site_name" content="Treks for All" />
    <meta property="og:image" content="https://treksforall.in/Home-Accessible.webp" />
    <meta property="og:image:secure_url" content="https://treksforall.in/Home-Accessible.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Treks for All - Inclusive Adventure Travel" />
    <meta property="og:image:type" content="image/webp" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Treks for All - Inclusive Adventure Travel for Everyone" />
    <meta name="twitter:description" content="WHERE OUTDOOR BELONGS TO EVERYONE AND ADVENTURE KNOWS NO BARRIER. Accessible trekking, river expeditions, and adventure stays designed for people of all abilities." />
    <meta name="twitter:image" content="https://treksforall.in/Home-Accessible.webp" />
    <meta name="twitter:image:alt" content="Treks for All - Inclusive Adventure Travel" />

    <!-- Additional SEO Meta Tags -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <meta name="language" content="English" />
    <meta name="rating" content="General" />
    <meta name="revisit-after" content="7 days" />

    <!-- Preload critical LCP image -->
    <link rel="preload" as="image" href="/Video-Cover.webp" fetchpriority="high">

    <!-- Preconnect to critical third parties -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://www.youtube.com">
    <link rel="dns-prefetch" href="https://i.ytimg.com">

    <!-- Critical inline styles to prevent FOUC and CLS -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        width: 100%;
        overflow-x: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      }
      #root { min-height: 100vh; }
      .font-loading body { visibility: visible; }

      /* Critical hero section styles */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        background-color: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(24px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        border-bottom: 1px solid rgba(226, 232, 240, 0.5);
      }

      /* Prevent layout shift for hero image */
      [role="banner"] {
        position: relative;
        width: 100%;
        min-height: 100vh;
        overflow: hidden;
        margin-top: 5rem;
      }

      /* Reserve space for hero image */
      [role="banner"] img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        inset: 0;
      }
    </style>

    <!-- Load fonts with display=swap for immediate text rendering -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/telegraf?display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
